<!doctype html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="icons/cardulatorlogoinstally.png">
    <link rel="apple-touch-icon" href="icons/cardulatorlogoinstally.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e11d48"> 

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log("Service Worker Registered"));
      }
    </script>

    <script src="https://cdn.tailwindcss.com/3.4.1" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star India Agencies | Mahindra Dealer Pro</title>

    <style>
        /* 4. CSS VARIABLES: Used for the 'Dynamic Themes' (Indigo, Pink, Black) */
        :root { --main-bg: #050505; --key-bg: #1a1a2e; --accent: #00ffff; --angle: 0deg; }
        
        body { background-color: #000; font-family: 'Rajdhani', sans-serif; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        /* RGB Border Animation Logic */
        .rgb-frame { padding: 4px; border-radius: 2.6rem; transition: all 0.5s; background: #111; }
        .rgb-active { background: linear-gradient(var(--angle), #ff0000, #000, #ff0000, #000, #ff0000) !important; animation: rotate 3s linear infinite; }
        @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes rotate { to { --angle: 360deg; } }

        /* Main App Container */
        .calculator-body { 
            width: 350px; height: 780px; background: var(--main-bg); border-radius: 2.5rem; 
            padding: 1.5rem; display: flex; flex-direction: column; position: relative; z-index: 10;
        }

        /* Calculator Screen */
        .display { 
            background: #000; height: 110px; border-radius: 1.5rem; margin-bottom: 1.5rem;
            display: flex; flex-direction: column; justify-content: center;
            padding: 1.5rem; text-align: right; border: 1px solid #222; overflow: hidden;
        }

        /* Key Glow & Mechanical Feel */
        .key { 
            background: var(--key-bg); color: var(--accent); font-weight: bold; border-radius: 0.8rem; 
            height: 60px; transition: all 0.1s; cursor: pointer; font-size: 1.2rem;
            position: relative; border: 2px solid transparent; background-clip: padding-box;
        }
        .key::after {
            content: ''; position: absolute; inset: -2px; border-radius: 0.8rem;
            background: linear-gradient(var(--angle), var(--accent), transparent, var(--accent));
            z-index: -1; animation: rotate 4s linear infinite; opacity: 0.3;
        }
        .key:active { transform: translateY(3px); filter: brightness(1.5); box-shadow: 0 0 15px var(--accent); }
        .history-key { font-size: 0.7rem !important; line-height: 1; color: #4ade80; }

        /* Live Status Blinking Dot */
        .live-dot { height: 8px; width: 8px; background-color: #22c55e; border-radius: 50%; display: inline-block; margin-right: 5px; position: relative; }
        .live-dot::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%; background-color: #22c55e; animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }

        /* Marquee Text Animation */
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .animate-marquee { display: inline-block; animation: marquee 12s linear infinite; }

        /* Modal styling */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        .contact-btn { background: linear-gradient(90deg, #e11d48, #9f1239); color: white; font-weight: bold; border-radius: 0.8rem; padding: 12px; font-size: 0.8rem; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; text-decoration: none; }
    </style>
</head>

<body> 
    <button id="installAppBtn" onclick="presentInstallPrompt()" style="display:none; position:fixed; top:10px; z-index:200;" class="bg-yellow-500 text-black font-bold py-2 px-4 rounded-full shadow-lg text-[10px]">📲 INSTALL APP</button>

    <div id="mainFrame" class="rgb-frame rgb-active">
        <div class="calculator-body">
            
            <div class="mb-4">
                <span class="text-[10px] font-bold text-red-500 block mb-2 tracking-widest uppercase text-center">Star India Agencies Pvt. Ltd.</span>
                <div class="flex gap-2">
                    <button onclick="toggleModal('themeModal')" class="flex-1 bg-gray-900 text-[9px] py-2 rounded-lg border border-gray-700 font-bold uppercase">⚙️ Settings</button>
                    <button onclick="toggleModal('contactModal')" class="flex-1 bg-red-950 text-[9px] py-2 rounded-lg border border-red-600 font-bold uppercase">📞 Contact</button>
                </div>
            </div>

            <div class="display">
                <div id="res" class="text-cyan-400 text-3xl font-bold font-['Orbitron']">0</div>
            </div>

            <div class="grid grid-cols-4 gap-2 mb-2" id="key-grid"></div>

            <a id="whatsappOfferLink" href="https://wa.me/917067321621" target="_blank" class="block">
                <div class="mt-2 overflow-hidden bg-black/40 rounded-xl border border-gray-800 p-2 relative cursor-pointer active:scale-95 transition-transform">
                    <div class="relative h-[140px] flex items-center justify-center overflow-hidden">
                        <img id="sliderImage" src="icons/range_of_cars.png" class="w-full h-auto max-h-[120px] object-contain transition-all duration-500 transform">
                    </div>

                    <div class="mt-2 bg-red-950/30 border-t border-red-900/50 py-1.5 overflow-hidden flex items-center">
                        <div class="flex items-center bg-black/60 px-2 py-0.5 rounded-full border border-green-900/50 mr-2 z-10">
                            <span class="live-dot"></span>
                            <span class="text-[7px] text-green-400 font-bold uppercase">Live</span>
                        </div>
                        <div id="offerText" class="whitespace-nowrap animate-marquee text-[10px] font-bold text-red-400 tracking-widest uppercase">
                            🚀 LOADING LATEST MAHINDRA OFFERS...
                        </div>
                    </div>
                </div>
            </a>

            <div class="mt-4 bg-black border border-gray-800 p-1 rounded overflow-hidden">
                <div class="whitespace-nowrap animate-marquee text-[10px] text-gray-500 uppercase">
                    Visit Star India Agencies for Best Deals | Happy Holi | Professional Calculator Hub
                </div>
            </div>

        </div>
    </div>

    <div id="themeModal" class="modal">
        <div class="bg-[#0f0f1a] border-2 border-cyan-900 rounded-[2rem] p-8 w-80 text-center">
            <h2 class="text-xl font-bold text-cyan-400 mb-6 font-['Orbitron']">SYSTEM CFG</h2>
            <div class="space-y-4 text-left">
                <button id="rgbToggle" onclick="toggleRGB()" class="w-full bg-green-900/30 text-green-400 p-2 rounded border border-green-700 text-xs font-bold uppercase">RGB FRAME: ON</button>
                <select id="themeSelect" onchange="applyChanges()" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-white">
                    <option value="black">Mechanical Black</option>
                    <option value="indigo">Indigo Blue</option>
                    <option value="white">White Hybrid</option>
                    <option value="pink">Cyber Pink</option>
                </select>
                <select id="soundSelect" onchange="saveSettings()" class="w-full bg-black border border-gray-700 p-2 rounded text-xs text-white">
                    <option value="blue">Blue Switch (Clicky)</option>
                    <option value="brown">Brown Switch (Tactile)</option>
                    <option value="red">Red Switch (Linear)</option>
                </select>
            </div>
            <button onclick="toggleModal('themeModal')" class="w-full bg-cyan-600 text-white font-bold py-3 rounded-xl mt-6">SAVE & CLOSE</button>
        </div>
    </div>

    <div id="contactModal" class="modal">
        <div class="bg-[#0f0f1a] border-2 border-red-600 rounded-[2rem] p-8 w-80 text-center">
            <h2 class="text-lg font-bold text-red-500 mb-4 font-['Orbitron']">CONTACT US</h2>
            <div class="space-y-2">
                <a href="tel:7067321621" class="contact-btn">🚗 BOOK NEW CAR</a>
                <a href="tel:9800055555" class="contact-btn !bg-indigo-800">🛠️ SERVICE BOOKING</a>
                <a href="https://wa.me/917067321621" class="contact-btn !bg-green-600">💬 WHATSAPP US</a>
            </div>
            <button onclick="toggleModal('contactModal')" class="mt-6 text-gray-500 text-[10px] uppercase">Close</button>
        </div>
    </div>

    <script>
        // 5. DATA: Slider images and WhatsApp pre-filled messages
        const carImages = [
            { src: 'icons/range_of_cars.png', offer: '🚀 XUV700: 0% DOWNPAYMENT DEAL', msg: 'Hi! I want details on the XUV700 offer.' },
            { src: 'icons/range_of_cars.png', offer: '🔥 THAR ROXX: BOOKINGS NOW OPEN', msg: 'I want to book the new THAR ROXX.' },
            { src: 'icons/range_of_cars.png', offer: '👑 SCORPIO-N: THE BIG DADDY IS HERE', msg: 'Send me the Scorpio-N price list.' }
        ];

        let expr = "";
        let audioCtx = null;
        let rgbOn = true;
        let currentIndex = 0;
        const keys = ['C', '÷', '×', '⌫', '7', '8', '9', '-', '4', '5', '6', '+', '1', '2', '3', '=', '0', '.', 'LOG'];

        // 6. INITIALIZATION: Load settings from phone memory on start
        window.onload = () => {
            renderKeys();
            loadSettings(); 
            setInterval(rotateSlider, 4000); // Start the car slider
        };

        // 7. STORAGE LOGIC: Saves/Loads settings so app stays the same after closing
        function saveSettings() {
            const cfg = { rgb: rgbOn, theme: document.getElementById('themeSelect').value, sound: document.getElementById('soundSelect').value };
            localStorage.setItem('mahindra_pro_cfg', JSON.stringify(cfg));
        }

        function loadSettings() {
            const saved = localStorage.getItem('mahindra_pro_cfg');
            if (saved) {
                const cfg = JSON.parse(saved);
                rgbOn = cfg.rgb;
                document.getElementById('themeSelect').value = cfg.theme;
                document.getElementById('soundSelect').value = cfg.sound;
                if(!rgbOn) document.getElementById('mainFrame').classList.remove('rgb-active');
                applyChanges();
            }
        }

        // 8. CALCULATOR LOGIC
        function renderKeys() {
            const grid = document.getElementById('key-grid');
            grid.innerHTML = "";
            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.className = `key ${k === '0' ? 'col-span-2' : ''} ${k === 'LOG' ? 'history-key' : ''}`;
                btn.innerText = k === 'LOG' ? 'LOG\nHISTORY' : k;
                btn.onclick = () => triggerAction(k);
                grid.appendChild(btn);
            });
        }

        function triggerAction(k) {
            playSound();
            const resDisplay = document.getElementById('res');
            
            // Handle History Log
            if (k === 'LOG') { 
                const history = JSON.parse(localStorage.getItem('calc_history_list') || "[]");
                if (history.length === 0) {
                    alert("No history found.");
                } else {
                    alert("Last 10 Calculations:\n\n" + history.join('\n'));
                }
                return; 
            }

            if (k === 'C') {
                expr = ""; 
            } else if (k === '⌫') {
                expr = expr.slice(0, -1);
            } else if (k === '=') {
                try {
                    let result = eval(expr.replace(/×/g, '*').replace(/÷/g, '/')).toString();
                    
                    // --- Updated History Logic ---
                    let history = JSON.parse(localStorage.getItem('calc_history_list') || "[]");
                    const entry = `${expr} = ${result}`;
                    
                    // Add new result to the top of the list
                    history.unshift(entry); 
                    
                    // Keep only the last 10 items
                    if (history.length > 10) history = history.slice(0, 10);
                    
                    localStorage.setItem('calc_history_list', JSON.stringify(history));
                    // -----------------------------

                    expr = result;
                } catch { expr = "Error"; }
            } else {
                if(expr === "Error") expr = "";
                expr += k;
            }
            resDisplay.innerText = expr || "0";
        } 

        

        function triggerAction(k) {
            playSound();
            const resDisplay = document.getElementById('res');
            if (k === 'LOG') { alert('Last Result: ' + (localStorage.getItem('calc_history') || 'None')); return; }
            if (k === 'C') expr = ""; 
            else if (k === '⌫') expr = expr.slice(0, -1);
            else if (k === '=') {
                try {
                    let result = eval(expr.replace(/×/g, '*').replace(/÷/g, '/')).toString();
                    localStorage.setItem('calc_history', expr + " = " + result);
                    expr = result;
                } catch { expr = "Error"; }
            } else {
                if(expr === "Error") expr = "";
                expr += k;
            }
            resDisplay.innerText = expr || "0";
        }

        // 9. DYNAMIC SLIDER & WHATSAPP INTEGRATION
        function rotateSlider() {
            const img = document.getElementById('sliderImage');
            const txt = document.getElementById('offerText');
            const link = document.getElementById('whatsappOfferLink');

            img.style.opacity = "0"; // Slide out
            img.style.transform = "translateX(-20px)";

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % carImages.length;
                const data = carImages[currentIndex];
                
                img.src = data.src;
                txt.innerText = data.offer + " — CLICK TO INQUIRE —";
                link.href = `https://wa.me/917067321621?text=${encodeURIComponent(data.msg)}`;
                
                img.style.transform = "translateX(20px)";
                setTimeout(() => {
                    img.style.opacity = "1"; // Slide in
                    img.style.transform = "translateX(0)";
                }, 50);
            }, 500);
        }

        // 10. UTILS: Sound, Theme, Modals
        function playSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const type = document.getElementById('soundSelect').value;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = (type === 'blue') ? 'square' : (type === 'brown') ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleRGB() {
            rgbOn = !rgbOn;
            document.getElementById('mainFrame').classList.toggle('rgb-active');
            document.getElementById('rgbToggle').innerText = rgbOn ? "RGB FRAME: ON" : "RGB FRAME: OFF";
            saveSettings();
        }

        function applyChanges() {
            const theme = document.getElementById('themeSelect').value;
            const themes = {
                black: { main: '#050505', key: '#1a1a2e', acc: '#00ffff' },
                indigo: { main: '#0a0a20', key: '#312e81', acc: '#818cf8' },
                white: { main: '#f3f4f6', key: '#ffffff', acc: '#111827' },
                pink: { main: '#2d0a1a', key: '#4d1635', acc: '#ff007f' }
            };
            const s = themes[theme];
            document.documentElement.style.setProperty('--main-bg', s.main);
            document.documentElement.style.setProperty('--key-bg', s.key);
            document.documentElement.style.setProperty('--accent', s.acc);
            saveSettings();
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        // PWA Install Prompt Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installAppBtn').style.display = 'block';
        });

        async function presentInstallPrompt() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('installAppBtn').style.display = 'none';
            }
        }
    </script>
</body>
</html>
